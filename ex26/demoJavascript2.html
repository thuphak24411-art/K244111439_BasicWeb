<html>
    <head>
        <meta charset='utf-8'>
        <title>Tiêu đề trang</title>
        <script src="js/mainjs.js"></script>
        <script type="text/javascript">
            function kiemTra(a)
            {
                anumber=eval(a)
                kq=isEven(anumber)
                if(kq==true) {
                    alert(anumber+" là số chẵn")
                }
                else {
                    alert(anumber+" là số lẻ")
                }
            }
        </script>
    </head>
    <body>
        <h1>Kiểm tra số chẵn hay lẻ</h1>
        <p>Nhập số:</p>
        <input type="text" id="soa">
        <p></p>
        <input type="button" value="Kiểm tra chẵn lẻ" 
            onclick="kiemTra(soa.value)">
    </body>
</html>
