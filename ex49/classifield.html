<html>
    <head>
        <meta charset="UTF-8">
        <title>Online Classifieds Search Form</title>

        <style>
            body{
                background-color:#9be5e5;
                font-family:"Times New Roman", serif;
            }
            
            .options{
                display:flex;
                gap:50px;
                margin-top:10px;
            }

            .column{
                display:flex;
                flex-direction:column;
                gap:10px;
            }

            input[type="text"]{
                width: 600px;
                padding:5px;
            }

            .buttons{
                margin-top:10px;
                display:flex;
                gap:20px;
            }

            .icon-btn{
                background: none;
                border: none;
                cursor:pointer;
            }
            img {
                width: 60px;
                height: 50px;
            }

            .label{
                font-size:18px;
                font-weight:bold;
            }
        </style>
    </head>

    <body>
        <h1 style="color: red; padding-top: 10px;">Online Classifieds Search Form</h1>

        <hr>

        <form name="classifiedForm">
            <div>
                <h3>1) Search for a classified in the following sections:</h3>
                <div class="options">
                    <div class="column">
                        <label>
                            <input type="radio" name="section">Employment
                        </label>

                        <label>
                            <input type="radio" name="section">For Sale
                        </label>

                        <label>
                            <input type="radio" name="section">Housing
                        </label>
                    </div>

                    <div class="column">
                        <label>
                            <input type="radio" name="section">Personal
                        </label>

                        <label>
                            <input type="radio" name="section">Miscellaneous
                        </label>

                        <label>
                            <input type="radio" name="section">All of the above
                        </label>
                    </div>
                </div>
            </div>

            <div>
                <h3>2) Search the following publications:</h3>
                <div class="options">
                    <div class="column">
                        <label>
                            <input type="checkbox" name="publication">Midwest Times
                        </label>

                        <label>
                            <input type="checkbox" name="publication">Great Lakes Classifieds
                        </label>
                    </div>

                    <div class="column">
                        <label>
                            <input type="checkbox" name="publication">Modern News
                        </label>

                        <label>
                            <input type="checkbox" name="publication">Middleton Daily
                        </label>
                    </div>

                    <div class="column">
                        <label>
                            <input type="checkbox" name="publication">Employment Today
                        </label>

                        <label>
                            <input type="checkbox" name="publication">Cashtown Daily News
                        </label>
                    </div>

                </div>
            </div>

            <div>
                <h3>
                    3) From <input type="date" name="date"> to <input type="date" name="date">
                </h3>
            </div>

            <div>
                <h3>4) Enter a few keywords to describe the classified.</h3>
                <input type="text" name="keyword">
            </div>

            <div>
                <h3>5) Click one of the options below:</h3>

                <div class="buttons">
                    <div>
                        <button type="button" class="icon-btn">
                            <img src="images/Search.gif" alt="">
                        </button>
                    </div>

                    <div>
                        <button type="button" class="icon-btn">
                            <img src="images/Help.gif" alt="">
                        </button>
                    </div>

                    <div>
                        <button type="reset" class="icon-btn">
                            <img src="images/Cancel.gif" alt="">
                        </button>
                    </div>
                </div>
            </div>
        </form>

    </body>
</html>
